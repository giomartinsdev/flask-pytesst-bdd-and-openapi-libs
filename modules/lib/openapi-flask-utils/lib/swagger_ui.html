<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>${title} &#8212; Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* ── Dark palette tokens ── */
    :root {
      --bg-page:       #0f1117;
      --bg-card:       #1a1d27;
      --bg-input:      #12151e;
      --bg-hover:      #1e2230;
      --border:        #2a2f45;
      --text-primary:  #e2e8f0;
      --text-muted:    #8892a4;
      --accent:        #f0f0f0;
      --accent-dim:    #e2e2e2;
      --get:           #1a4a6b;
      --get-border:    #2d7ab5;
      --get-text:      #61affe;
      --post:          #1a4a2e;
      --post-border:   #2d8a4e;
      --post-text:     #49cc90;
      --put:           #4a3a10;
      --put-border:    #b07d2d;
      --put-text:      #fca130;
      --patch:         #2a3a1a;
      --patch-border:  #5a7a2d;
      --patch-text:    #50e3c2;
      --delete:        #4a1a1a;
      --delete-border: #a03030;
      --delete-text:   #f93e3e;
    }

    /* ── Page & top bar ── */
    body, .swagger-ui {
      background: var(--bg-page) !important;
      color: var(--text-primary) !important;
    }
    .swagger-ui .topbar {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
    }
    .swagger-ui .topbar .download-url-wrapper { display: none; }
    .swagger-ui .topbar-wrapper .link { display: flex; align-items: center; gap: 10px; }
    .swagger-ui .topbar-wrapper .link::before {
      content: "⚡";
      font-size: 1.4rem;
    }
    .swagger-ui .topbar-wrapper img { display: none; }
    .swagger-ui .topbar-wrapper .link span {
      color: var(--text-primary) !important;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .02em;
    }

    /* ── Info block ── */
    .swagger-ui .info { margin: 30px 0 20px; }
    .swagger-ui .info .title,
    .swagger-ui .info h1, .swagger-ui .info h2,
    .swagger-ui .info h3, .swagger-ui .info h4,
    .swagger-ui .info h5 {
      color: var(--text-primary) !important;
    }
    .swagger-ui .info .base-url,
    .swagger-ui .info p,
    .swagger-ui .info li,
    .swagger-ui .info a {
      color: var(--text-muted) !important;
    }

    /* ── Operation blocks ── */
    .swagger-ui .opblock-tag {
      color: var(--text-primary) !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .swagger-ui .opblock-tag:hover { background: var(--bg-hover) !important; }
    .swagger-ui .opblock {
      border-radius: 8px !important;
      margin-bottom: 8px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.4) !important;
    }
    /* GET */
    .swagger-ui .opblock.opblock-get {
      background: var(--get) !important;
      border-color: var(--get-border) !important;
    }
    .swagger-ui .opblock.opblock-get .opblock-summary-method {
      background: var(--get-border) !important;
      color: #fff !important;
    }
    .swagger-ui .opblock.opblock-get .opblock-summary-path,
    .swagger-ui .opblock.opblock-get .opblock-summary-description {
      color: var(--get-text) !important;
    }
    /* POST */
    .swagger-ui .opblock.opblock-post {
      background: var(--post) !important;
      border-color: var(--post-border) !important;
    }
    .swagger-ui .opblock.opblock-post .opblock-summary-method {
      background: var(--post-border) !important;
      color: #fff !important;
    }
    .swagger-ui .opblock.opblock-post .opblock-summary-path,
    .swagger-ui .opblock.opblock-post .opblock-summary-description {
      color: var(--post-text) !important;
    }
    /* PUT */
    .swagger-ui .opblock.opblock-put {
      background: var(--put) !important;
      border-color: var(--put-border) !important;
    }
    .swagger-ui .opblock.opblock-put .opblock-summary-method {
      background: var(--put-border) !important;
      color: #fff !important;
    }
    .swagger-ui .opblock.opblock-put .opblock-summary-path,
    .swagger-ui .opblock.opblock-put .opblock-summary-description {
      color: var(--put-text) !important;
    }
    /* PATCH */
    .swagger-ui .opblock.opblock-patch {
      background: var(--patch) !important;
      border-color: var(--patch-border) !important;
    }
    .swagger-ui .opblock.opblock-patch .opblock-summary-method {
      background: var(--patch-border) !important;
      color: #fff !important;
    }
    .swagger-ui .opblock.opblock-patch .opblock-summary-path,
    .swagger-ui .opblock.opblock-patch .opblock-summary-description {
      color: var(--patch-text) !important;
    }
    /* DELETE */
    .swagger-ui .opblock.opblock-delete {
      background: var(--delete) !important;
      border-color: var(--delete-border) !important;
    }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method {
      background: var(--delete-border) !important;
      color: #fff !important;
    }
    .swagger-ui .opblock.opblock-delete .opblock-summary-path,
    .swagger-ui .opblock.opblock-delete .opblock-summary-description {
      color: var(--delete-text) !important;
    }

    /* ── Expanded operation body ── */
    .swagger-ui .opblock .opblock-body,
    .swagger-ui .opblock .opblock-section,
    .swagger-ui .tab-header,
    .swagger-ui .opblock-description-wrapper {
      background: var(--bg-card) !important;
    }
    .swagger-ui .opblock .opblock-body .opblock-section-header {
      background: var(--bg-card) !important;
      border-top: 1px solid var(--border) !important;
    }
    .swagger-ui .opblock .opblock-body .opblock-section-header h4,
    .swagger-ui .opblock .opblock-body .opblock-section-header label,
    .swagger-ui .opblock .tab-header .tab-item,
    .swagger-ui .opblock .opblock-body table thead tr th,
    .swagger-ui .opblock .opblock-body label,
    .swagger-ui .opblock .opblock-body p,
    .swagger-ui .opblock .opblock-body span,
    .swagger-ui .opblock .opblock-body div {
      color: var(--text-primary) !important;
    }
    .swagger-ui .parameter__name,
    .swagger-ui .parameter__type,
    .swagger-ui .parameter__deprecated,
    .swagger-ui .parameter__in { color: var(--text-muted) !important; }

    /* ── Inputs & textareas ── */
    .swagger-ui input[type=text],
    .swagger-ui input[type=password],
    .swagger-ui input[type=search],
    .swagger-ui input[type=email],
    .swagger-ui textarea,
    .swagger-ui select {
      background: var(--bg-input) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
    }
    .swagger-ui input[type=text]:focus,
    .swagger-ui textarea:focus {
      border-color: var(--accent) !important;
      outline: none !important;
      box-shadow: 0 0 0 2px rgba(124,106,247,.25) !important;
    }

    /* ── Buttons ── */
    .swagger-ui .btn {
      border-radius: 6px !important;
      font-weight: 600 !important;
      transition: all .15s ease !important;
    }
    .swagger-ui .btn.execute {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
    }
    .swagger-ui .btn.execute:hover {
      background: #9580ff !important;
      transform: translateY(-1px);
    }
    .swagger-ui .btn.authorize {
      background: transparent !important;
      border-color: var(--post-border) !important;
      color: var(--post-text) !important;
    }
    .swagger-ui .btn.authorize svg { fill: var(--post-text) !important; }
    .swagger-ui .btn.authorize:hover {
      background: var(--post) !important;
    }
    .swagger-ui .btn.cancel {
      border-color: var(--delete-border) !important;
      color: var(--delete-text) !important;
    }
    .swagger-ui .btn-group .btn:hover { opacity: .85; }

    /* ── Models / Schemas ── */
    .swagger-ui section.models,
    .swagger-ui .model-box,
    .swagger-ui .model-container,
    .swagger-ui .model {
      background: var(--bg-card) !important;
      border-color: var(--border) !important;
    }
    .swagger-ui section.models h4,
    .swagger-ui .model-title,
    .swagger-ui .model .property,
    .swagger-ui .model .property.primitive,
    .swagger-ui .model-box span,
    .swagger-ui .model span,
    .swagger-ui table.model tr.property-row td {
      color: var(--text-primary) !important;
    }
    .swagger-ui .prop-type { color: var(--accent) !important; }
    .swagger-ui .prop-format { color: var(--text-muted) !important; }

    /* ── Response codes ── */
    .swagger-ui table tbody tr td,
    .swagger-ui table thead tr th {
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }
    .swagger-ui .response-col_status { color: var(--post-text) !important; }
    .swagger-ui .response-col_description { color: var(--text-muted) !important; }
    .swagger-ui .responses-inner h4,
    .swagger-ui .responses-inner h5 { color: var(--text-primary) !important; }

    /* ── Code / response body ── */
    .swagger-ui .microlight,
    .swagger-ui .highlight-code,
    .swagger-ui pre.microlight {
      background: #0d1117 !important;
      color: #a5f3a5 !important;
      border-radius: 6px !important;
      padding: 12px !important;
    }

    /* ── Authorize modal ── */
    .swagger-ui .dialog-ux .modal-ux {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: 0 20px 60px rgba(0,0,0,.6) !important;
    }
    .swagger-ui .dialog-ux .modal-ux-header {
      background: var(--bg-page) !important;
      border-bottom: 1px solid var(--border) !important;
      border-radius: 12px 12px 0 0 !important;
    }
    .swagger-ui .dialog-ux .modal-ux-header h3,
    .swagger-ui .dialog-ux .modal-ux-content h4,
    .swagger-ui .dialog-ux .modal-ux-content h5,
    .swagger-ui .dialog-ux .modal-ux-content p,
    .swagger-ui .dialog-ux .modal-ux-content label,
    .swagger-ui .dialog-ux .modal-ux-content li,
    .swagger-ui .dialog-ux .modal-ux-content code {
      color: var(--text-primary) !important;
    }
    .swagger-ui .dialog-ux .modal-ux-content { background: var(--bg-card) !important; }

    /* ── Scheme container (Authorize bar) ── */
    .swagger-ui .scheme-container {
      background: var(--bg-card) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
      padding: 12px 20px !important;
    }
    .swagger-ui .scheme-container .schemes > label,
    .swagger-ui .scheme-container .schemes-title,
    .swagger-ui .auth-wrapper,
    .swagger-ui .auth-wrapper .authorize {
      color: var(--text-primary) !important;
    }

    /* ── Auth modal inner content ── */
    .swagger-ui .auth-container,
    .swagger-ui .auth-container h4,
    .swagger-ui .auth-container h5,
    .swagger-ui .auth-container p,
    .swagger-ui .auth-container code,
    .swagger-ui .auth-container li,
    .swagger-ui .auth-container label {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
    }
    .swagger-ui .auth-container .wrapper {
      background: var(--bg-card) !important;
    }
    .swagger-ui .scopes h2,
    .swagger-ui .scopes span {
      color: var(--text-muted) !important;
    }

    /* ── Misc ── */
    .swagger-ui .wrapper { max-width: 1280px; }
    .swagger-ui svg { fill: var(--text-muted); }
    .swagger-ui .arrow { fill: var(--text-muted) !important; }
    .swagger-ui a { color: var(--accent) !important; }
    .swagger-ui a:hover { color: #9580ff !important; }
    .swagger-ui hr { border-color: var(--border) !important; }
    .swagger-ui .opblock-tag-section { margin-bottom: 12px; }
    .loading-container { background: var(--bg-page) !important; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: "/openapi.json",
      dom_id: "#swagger-ui",
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset,
      ],
      layout: "BaseLayout",
      deepLinking: true,
      tryItOutEnabled: true,
      displayRequestDuration: true,
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 1,
      ${persist_authorization}
    });
  </script>
</body>
</html>
